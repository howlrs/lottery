services:
  lottery:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=file:/app/data/prod.db
      - ADMIN_SECRET=${ADMIN_SECRET:-}
    volumes:
      - lottery-data:/app/data
    restart: unless-stopped

volumes:
  lottery-data:
