<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Candidate 5: Clover / Lucky -->
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg5)"/>
  <!-- Four leaf clover -->
  <g transform="translate(256,240)">
    <!-- Top leaf -->
    <ellipse cx="0" cy="-70" rx="60" ry="75" fill="#34d399"/>
    <!-- Right leaf -->
    <ellipse cx="70" cy="0" rx="75" ry="60" fill="#10b981"/>
    <!-- Bottom leaf -->
    <ellipse cx="0" cy="70" rx="60" ry="75" fill="#34d399"/>
    <!-- Left leaf -->
    <ellipse cx="-70" cy="0" rx="75" ry="60" fill="#10b981"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="20" fill="#065f46"/>
  </g>
  <!-- Stem -->
  <path d="M256 300 Q270 380 290 440" fill="none" stroke="#059669" stroke-width="12" stroke-linecap="round"/>
  <!-- Sparkle -->
  <circle cx="380" cy="100" r="8" fill="#a7f3d0" opacity="0.7"/>
  <circle cx="130" cy="130" r="6" fill="#a7f3d0" opacity="0.5"/>
  <circle cx="400" cy="380" r="5" fill="#a7f3d0" opacity="0.6"/>
